services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: beerdb
      POSTGRES_USER: beeruser
      POSTGRES_PASSWORD: beerpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=beerdb;Username=beeruser;Password=beerpass
      CatalogBeer__ApiKey: ${CATALOG_BEER_API_KEY:-}
    depends_on:
      - db
    ports:
      - "5153:8080"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: http://localhost:5153
    depends_on:
      - api
    ports:
      - "3001:3000"

volumes:
  pgdata:
