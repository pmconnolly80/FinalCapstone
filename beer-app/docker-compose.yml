services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: beerdb
      POSTGRES_USER: beeruser
      POSTGRES_PASSWORD: beerpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=beerdb;Username=beeruser;Password=beerpass
      CatalogBeer__ApiKey: ${CATALOG_BEER_API_KEY:-}
      Email__SmtpHost: ${EMAIL_SMTP_HOST:-}
      Email__SmtpPort: ${EMAIL_SMTP_PORT:-587}
      Email__Username: ${EMAIL_USERNAME:-}
      Email__Password: ${EMAIL_PASSWORD:-}
      Email__FromAddress: ${EMAIL_FROM_ADDRESS:-}
      Email__FromName: ${EMAIL_FROM_NAME:-The Tavern}
      # Unset by default so password-reset links fall back to the request's Origin header,
      # same LAN-IP-friendly logic as the frontend's own API base URL derivation (#32). Set
      # only for a real deployment where the API isn't reached at the same host as the SPA.
      Frontend__BaseUrl: ${FRONTEND_BASE_URL:-}
      Authentication__Google__ClientId: ${GOOGLE_CLIENT_ID:-}
      Authentication__Google__ClientSecret: ${GOOGLE_CLIENT_SECRET:-}
      Authentication__Facebook__AppId: ${FACEBOOK_APP_ID:-}
      Authentication__Facebook__AppSecret: ${FACEBOOK_APP_SECRET:-}
      Authentication__Apple__ClientId: ${APPLE_CLIENT_ID:-}
      Authentication__Apple__TeamId: ${APPLE_TEAM_ID:-}
      Authentication__Apple__KeyId: ${APPLE_KEY_ID:-}
      # The .p8 private key's PEM content, newlines escaped as literal \n (Program.cs
      # un-escapes them) since a real multi-line value can't round-trip through a
      # single-line .env entry.
      Authentication__Apple__PrivateKey: ${APPLE_PRIVATE_KEY:-}
      # Anomaly-detection thresholds (#58) — none are secrets, just overridable for
      # per-tavern tuning later without a rebuild (IMPLEMENTATION_BACKLOG.md Phase 5).
      Anomalies__BulkBeerAdd__WindowMinutes: ${ANOMALIES_BULK_ADD_WINDOW_MINUTES:-60}
      Anomalies__BulkBeerAdd__Threshold: ${ANOMALIES_BULK_ADD_THRESHOLD:-10}
      Anomalies__BulkBeerAdd__LookbackHours: ${ANOMALIES_BULK_ADD_LOOKBACK_HOURS:-24}
      Anomalies__ConfirmationVelocity__WindowMinutes: ${ANOMALIES_VELOCITY_WINDOW_MINUTES:-60}
      Anomalies__ConfirmationVelocity__BaselineDays: ${ANOMALIES_VELOCITY_BASELINE_DAYS:-7}
      Anomalies__ConfirmationVelocity__Multiplier: ${ANOMALIES_VELOCITY_MULTIPLIER:-3.0}
      Anomalies__ConfirmationVelocity__MinimumCount: ${ANOMALIES_VELOCITY_MINIMUM_COUNT:-5}
      Anomalies__ConfirmationVelocity__LookbackHours: ${ANOMALIES_VELOCITY_LOOKBACK_HOURS:-24}
      Anomalies__OffHours__OpenHour: ${ANOMALIES_OFF_HOURS_OPEN_HOUR:-10}
      Anomalies__OffHours__CloseHour: ${ANOMALIES_OFF_HOURS_CLOSE_HOUR:-2}
      Anomalies__OffHours__TimeZoneId: ${ANOMALIES_OFF_HOURS_TIMEZONE:-}
      Anomalies__OffHours__LookbackHours: ${ANOMALIES_OFF_HOURS_LOOKBACK_HOURS:-24}
      Anomalies__OffHours__MaxItems: ${ANOMALIES_OFF_HOURS_MAX_ITEMS:-50}
    depends_on:
      - db
    ports:
      - "5153:8080"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # No VITE_API_URL override: the frontend derives the API host from whatever host the
    # page itself was loaded from (see api.js), so both http://localhost:3001 and a real
    # phone opening http://<lan-ip>:3001 reach the API at the same host on :5153. Set
    # VITE_API_URL explicitly only for a real deployment where the API lives elsewhere.
    depends_on:
      - api
    ports:
      - "3001:3000"

volumes:
  pgdata:
