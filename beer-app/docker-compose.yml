services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: beerdb
      POSTGRES_USER: beeruser
      POSTGRES_PASSWORD: beerpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=beerdb;Username=beeruser;Password=beerpass
      CatalogBeer__ApiKey: ${CATALOG_BEER_API_KEY:-}
    depends_on:
      - db
    ports:
      - "5153:8080"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # No VITE_API_URL override: the frontend derives the API host from whatever host the
    # page itself was loaded from (see api.js), so both http://localhost:3001 and a real
    # phone opening http://<lan-ip>:3001 reach the API at the same host on :5153. Set
    # VITE_API_URL explicitly only for a real deployment where the API lives elsewhere.
    depends_on:
      - api
    ports:
      - "3001:3000"

volumes:
  pgdata:
